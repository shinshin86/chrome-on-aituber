name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # GitHub Releases にアップロードした piper アセットの URL
  # 例: https://github.com/<owner>/<repo>/releases/download/piper-assets-v1/piper-assets.tar.gz
  PIPER_ASSETS_URL: ${{ vars.PIPER_ASSETS_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download piper assets
        run: |
          curl -L -o piper-assets.tar.gz "$PIPER_ASSETS_URL"
          tar -xzf piper-assets.tar.gz -C public/
          rm piper-assets.tar.gz

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
